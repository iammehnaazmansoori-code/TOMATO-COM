<!DOCTYPE html>
<html>
<head>
<title>My Game Zone</title>
<style>
body{
background:#0f0f1a;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#1c1c2e;
padding:15px;
font-size:22px;
font-weight:bold;
}

.games{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:#1c1c2e;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
}

.card button{
width:100%;
padding:10px;
background:#7b3fe4;
border:none;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<header>🎮 My Game Zone</header>

<div class="games">

<div class="card">
<img src="https://picsum.photos/300/200">
<button onclick="alert('Game Coming Soon 😎')">Play</button>
</div>

<div class="card">
<img src="https://picsum.photos/301/200">
<button onclick="alert('Game Coming Soon 😎')">Play</button>
</div>

</div>

</body>
</html>
