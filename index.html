<!DOCTYPE html>
<html>
<head>
<title>Tomato Games</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f0f1a;
    color:white;
}

header{
    background:#1c1c2e;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    margin:0;
    color:#ff4d4d;
}

.games{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:#1c1c2e;
    padding:20px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    background:#29294d;
}

button{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    background:#ff4d4d;
    color:white;
    border-radius:20px;
    cursor:pointer;
}

button:hover{
    background:#ff1a1a;
}
</style>

</head>
<body>

<header>
    <h1>🍅 Tomato Games</h1>
</header>

<div class="games">

<div class="card">
    <h3>Game 1</h3>
    <button onclick="location.href='zombie_game.html'">Play</button>
</div>

<div class="card">
    <h3>Game 2</h3>
    <button onclick="alert('Game Start!')">Play</button>
</div>

<div class="card">
    <h3>Game 3</h3>
    <button onclick="alert('Game Start!')">Play</button>
</div>

<div class="card">
    <h3>Game 4</h3>
    <button onclick="alert('Game Start!')">Play</button>
</div>

</div>

</body>
</html>
