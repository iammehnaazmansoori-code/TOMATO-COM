<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tomato Games</title>
  <style>
    /* Body & general style */
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#0f0f1a;
      color:white;
      padding-top:160px; /* Taaki banner ke neeche content aaye */
    }

    /* Banner style */
    #banner{
      position:absolute;
      top:0;
      width:100%;
      height:150px;
      background: linear-gradient(to right, #ff0000, #800000);
      display:flex;
      align-items:center;
      justify-content:left;
      padding-left:20px;
      z-index:10;
    }

    #banner img{
      height:120px;
      margin-right:20px;
      border-radius:15px;
    }

    #banner h1{
      color:white;
      font-family: 'Arial Black', sans-serif;
      font-size:32px;
      text-shadow: 2px 2px 5px black;
      margin:0;
    }

    /* Header style */
    header{
      background:#1c1c2e;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header h1{
      margin:0;
      color:#ff4d4d;
    }

    /* Games grid */
    .games{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
      gap:15px;
      padding:20px;
    }

    .card{
      background:#1c1c2e;
      padding:20px;
      border-radius:15px;
      text-align:center;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
      background:#29294d;
    }

    button{
      margin-top:10px;
      padding:8px 15px;
      border:none;
      background:#ff4d4d;
      color:white;
      border-radius:20px;
      cursor:pointer;
    }

    button:hover{
      background:#ff1a1a;
    }
  </style>
</head>
<body>

  <!-- Banner -->
  <div id="banner">
    <img src="https://i.imgur.com/yourimage.png" alt="Tomato Games Banner" />
    <h1>🍅 Tomato Games</h1>
  </div>

  <!-- Header (optional, can remove if banner enough) -->
  <header>
    <h1>🍅 Tomato Games</h1>
  </header>

  <!-- Game cards -->
  <div class="games">

    <div class="card">
      <h3>Game 1</h3>
      <button onclick="location.href='zombie_game.html'">Play</button>
    </div>

    <div class="card">
      <h3>Game 2</h3>
      <button onclick="alert('Game Start!')">Play</button>
    </div>

    <div class="card">
      <h3>Game 3</h3>
      <button onclick="alert('Game Start!')">Play</button>
    </div>

    <div class="card">
      <h3>Game 4</h3>
      <button onclick="alert('Game Start!')">Play</button>
    </div>

  </div>

</body>
</html>
