<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zombie Escape 3D v2</title>
<style>
  body{margin:0; overflow:hidden; font-family:Arial; background:#0f0f1a;}
  #score{
    position:absolute; top:10px; left:10px; color:white; font-size:20px;
    background:rgba(0,0,0,0.5); padding:5px 10px; border-radius:10px;
  }
  #distance{
    position:absolute; top:40px; left:10px; color:white; font-size:20px;
    background:rgba(0,0,0,0.5); padding:5px 10px; border-radius:10px;
  }

  /* Joystick */
  #joystick {
    position:absolute; bottom:20px; left:20px;
    width:120px; height:120px; border:3px solid white;
    border-radius:50%; background:rgba(255,255,255,0.1);
    touch-action:none;
  }
  #stick{
    position:absolute; width:60px; height:60px;
    background:white; border-radius:50%;
    top:30px; left:30px;
    opacity:0.7;
  }
</style>
</head>
<body>

<div id="score">Score: 0</div>
<div id="distance">Distance: 0</div>
<div id="joystick"><div id="stick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// Player cube
let playerGeo = new THREE.BoxGeometry(1,1,1);
let playerMat = new THREE.MeshBasicMaterial({color:0x00ff00});
let player = new THREE.Mesh(playerGeo, playerMat);
player.position.y=0.5;
scene.add(player);

// Ground / road
let ground = new THREE.Mesh(new THREE.PlaneGeometry(50,50), new THREE.MeshBasicMaterial({color:0x555555}));
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// Zombies
let zombies = [];
for(let i=0;i<6;i++){
  let z = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshBasicMaterial({color:0xff0000}));
  z.position.set(Math.random()*20-10,0.5,Math.random()*-20);
  scene.add(z); zombies.push(z);
}

// Buildings (city blocks)
for(let i=-20;i<20;i+=5){
  for(let j=-20;j<20;j+=5){
    if(Math.random()<0.3){
      let b = new THREE.Mesh(
        new THREE.BoxGeometry(1+Math.random()*2,2+Math.random()*3,1+Math.random()*2),
        new THREE.MeshBasicMaterial({color:0x4444ff})
      );
      b.position.set(i, b.geometry.parameters.height/2, j);
      scene.add(b);
    }
  }
}

// Camera
camera.position.set(0,5,10);
camera.lookAt(player.position);

// Controls
let keys={};
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

// Score / Distance
let score=0, distance=0;
let scoreDiv=document.getElementById('score');
let distDiv=document.getElementById('distance');

// Joystick
let stick = document.getElementById('stick');
let joystick = document.getElementById('joystick');
let move={x:0,z:0};
let dragging=false;
let maxRadius = 50;

stick.addEventListener('pointerdown', ()=>{dragging=true;});
stick.addEventListener('pointermove', (e)=>{
  if(!dragging) return;
  let rect = joystick.getBoundingClientRect();
  let cx = rect.left+rect.width/2;
  let cy = rect.top+rect.height/2;
  let dx = e.clientX-cx;
  let dy = e.clientY-cy;
  let dist = Math.min(maxRadius, Math.sqrt(dx*dx+dy*dy));
  let angle = Math.atan2(dy,dx);
  stick.style.left = 30+dist*Math.cos(angle)+"px";
  stick.style.top = 30+dist*Math.sin(angle)+"px";
  // Fixed vertical mapping
  move.x = (dx/maxRadius)*0.2;   // left/right
  move.z = -(dy/maxRadius)*0.2;  // up/down corrected: drag up = move forward
});
stick.addEventListener('pointerup', endDrag);
stick.addEventListener('pointerleave', endDrag);
function endDrag(){dragging=false; stick.style.left='30px'; stick.style.top='30px'; move={x:0,z:0};}

// Animate
function animate(){
  requestAnimationFrame(animate);

  // Player keyboard
  if(keys['w']||keys['arrowup']) player.position.z-=0.2;
  if(keys['s']||keys['arrowdown']) player.position.z+=0.2;
  if(keys['a']||keys['arrowleft']) player.position.x-=0.2;
  if(keys['d']||keys['arrowright']) player.position.x+=0.2;

  // Player joystick
  player.position.x += move.x;
  player.position.z += move.z;

  // Zombies follow
  zombies.forEach(z=>{
    let dx=player.position.x-z.position.x;
    let dz=player.position.z-z.position.z;
    let dist=Math.sqrt(dx*dx+dz*dz);
    z.position.x += 0.01*dx/dist;
    z.position.z += 0.01*dz/dist;
  });

  // Camera
  camera.position.x=player.position.x;
  camera.position.z=player.position.z+10;
  camera.lookAt(player.position);

  // Score / Distance
  score+=0.01;
  distance+=Math.sqrt(move.x*move.x+move.z*move.z);
  scoreDiv.innerText="Score: "+Math.floor(score);
  distDiv.innerText="Distance: "+Math.floor(distance);

  renderer.render(scene,camera);
}

animate();
</script>
</body>
</html>
